repositories:
  - name: grafana
    url: https://grafana.github.io/helm-charts

releases:

  - name: loki
    namespace: monitoring
    chart: grafana/loki
    version: 6.23.0
    values:
      - loki:
          auth_enabled: true
          commonConfig:
            replication_factor: 1
          schemaConfig:
            configs:
              - from: "2024-04-01"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          storage_config:
            aws:
              region: <AWS region your bucket is in, for example, `eu-west-2`>
              bucketnames: <Your AWS bucket for chunk, for exaxmple,  `aws-loki-dev-chunk`>
              s3forcepathstyle: false
          pattern_ingester:
            enabled: true
          limits_config:
            allow_structured_metadata: true
            volume_enabled: true
            retention_period: 672h # 28 days retention

          storage:
            type: s3
            bucketNames:
              chunks: infra-loki
              ruler: infra-loki
              admin: infra-loki

        # Disable minio storage
      - minio:
          enabled: false

      - singleBinary:
          replicas: 0

      - deploymentMode: SimpleScalable
      - backend:
          replicas: 1
          tolerations:
            - key: node-role
              operator: Equal
              value: infra
              effect: NoSchedule
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io
                        operator: In
                        values:
                          - infra
      - read:
          replicas: 1
          tolerations:
            - key: node-role
              operator: Equal
              value: infra
              effect: NoSchedule
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io
                        operator: In
                        values:
                          - infra
      - write:
          replicas: 1
          tolerations:
            - key: node-role
              operator: Equal
              value: infra
              effect: NoSchedule
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io
                        operator: In
                        values:
                          - infra

      - ingester:
          replicas: 0
      - querier:
          replicas: 0
      - queryFrontend:
          replicas: 0
      - queryScheduler:
          replicas: 0
      - distributor:
          replicas: 0
      - compactor:
          replicas: 0
      - indexGateway:
          replicas: 0
      -  bloomCompactor:
          replicas: 0
      - bloomGateway:
          replicas: 0
      - lokiCanary:
          tolerations:
            - key: node-role
              operator: Equal
              value: infra
              effect: NoSchedule
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io
                        operator: In
                        values:
                          - infra
      - gateway:
          tolerations:
            - key: node-role
              operator: Equal
              value: infra
              effect: NoSchedule
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io
                        operator: In
                        values:
                          - infra
      - resultsCache:
          tolerations:
            - key: node-role
              operator: Equal
              value: infra
              effect: NoSchedule
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io
                        operator: In
                        values:
                          - infra
      - chunksCache:
          tolerations:
            - key: node-role
              operator: Equal
              value: infra
              effect: NoSchedule
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: node-role.kubernetes.io
                        operator: In
                        values:
                          - infra
          resources:
            requests:
              cpu: 100m
              memory: 100Mi



